<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Sign-Up </title>
        <link rel="stylesheet" href="style.css">
	</head>
	<body>
		<h1>SIGN UP TO DESTROY ALL OPPS</h1>

        <form action="idk" method="post">
            <label for="first_name">First Name:</label>
            <input type="text" id="first_name" name="first_name" placeholder="Gerbert" required>
        </form>
        <form action="idk" method="post"></form>
            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name" placeholder="Anderdingus" required>
        </form>
        <form action="idk" method="post"></form>
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="gerbert@67mail.com" required>
        </form>
        <form action="idk" method="post"></form>
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="1234567890" required>
        </form>
        <form action="idk" method="post"></form>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </form>
        <form action="idk" method="post"></form>
            <label for="confirm_password">Confirm Password:</label>
            <input type="password" id="confirm_password" name="password" required>
        </form>

	</body>
</html>
