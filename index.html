<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Sign-Up </title>
        <link rel="stylesheet" href="style.css">
	</head>
	<body>

        <div><img src="./assets/logo.png"></div>
        <div class="main">
		    <h1>SIGN UP TO DESTROY <span class="emp"><em>ALL</em></span> OPPS</h1>
            <div class="mid">
                <p>This is (unfortunately) not a real online service! There are <span class="emp"><em>ZERO</em></span> opps actually being destroyed here. Have a nice day.</p>
            </div>
            <form action="idk" method="post">
                <label for="first_name">First Name:</label>
                <input type="text" id="first_name"  placeholder="Gerbert" required>
        
                <label for="last_name">Last Name:</label>
                <input type="text" id="last_name" placeholder="Anderdingus" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email"  placeholder="gerbert@67mail.com" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" placeholder="1234567890" required>

                <label for="password">Password:</label>
                <input type="password" id="password"  required>

                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password"  required>
            </form>
                    <button type="submit">Sign Up</button>
            </form>
            <p class="login">Already have an account? <a href="https://example.com">Log In!</a></p>
        </div>
        <div class="footer">
            <p>Half Life 2 stalker render in the logo is from Combine Overwiki, That of which (the render) is owned by Valve.</p>
        </div>
	</body>
</html>
