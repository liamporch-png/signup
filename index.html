<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Sign-Up </title>
        <link rel="stylesheet" href="style.css">
	</head>
	<body>
        <div class="main">
		    <h1>SIGN UP TO DESTROY ALL OPPS</h1>
            <div class="mid">
                <p>Have OPPS in need of destroying? GOOD. Just sign up below so that you can get these goofy ahh ghouls to show up to your GREATEST, WORST, OPP'S house</p>
                <img src="./assets/josh.png">
            </div>
            <form action="idk" method="post">
                <label for="first_name">First Name:</label>
                <input type="text" id="first_name"  placeholder="Gerbert" required>
            </form>
            <form action="idk" method="post"></form>
                <label for="last_name">Last Name:</label>
                <input type="text" id="last_name" placeholder="Anderdingus" required>
            </form>
            <form action="idk" method="post"></form>
                <label for="email">Email Address:</label>
                <input type="email" id="email"  placeholder="gerbert@67mail.com" required>
            </form>
            <form action="idk" method="post"></form>
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" placeholder="1234567890" required>
            </form>
            <form action="idk" method="post"></form>
                <label for="password">Password:</label>
                <input type="password" id="password"  required>
            </form>
            <form action="idk" method="post"></form>
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password"  required>
            </form>
            <form>
                    <button type="submit">Submit</button>
            </form>
        </div>
	</body>
</html>
